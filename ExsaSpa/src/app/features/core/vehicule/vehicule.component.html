<p-toolbar>
    <ng-template #start>
        <p-button
            label="Dépenses"
            icon="pi pi-wrench"
            severity="secondary"
            (click)="detaisDepenses()" />
    </ng-template>
    <ng-template #end>
        <p-button
            label="Nouveau"
            icon="pi pi-plus"
            severity="secondary"
            (click)="openNew()" />
    </ng-template>
</p-toolbar>

<p-table
    #dt
    [value]="vehicules()"
    [rows]="10"
    [paginator]="true"
    [rowHover]="true"
    [globalFilterFields]="['immatriculation','marque','modele']"
    [tableStyle]="{ 'min-width': '50rem' }">

    <ng-template #caption>
        <div class="flex justify-between">
            <h5>Gestion des véhicules</h5>

            <p-iconfield>
                <p-inputicon styleClass="pi pi-search"></p-inputicon>

                <input
                    pInputText
                    type="text"
                    (input)="onGlobalFilter(dt, $event)"
                    placeholder="Recherche..." />
            </p-iconfield>
        </div>
    </ng-template>

    <ng-template #header>
        <tr>
            <th>Immatriculation</th>
            <th>Marque</th>
            <th>Modèle</th>
            <th>Année</th>
            <th>Type</th>
            <th>Statut</th>
            <th></th>
        </tr>
    </ng-template>

    <ng-template #body let-vehicule>
        <tr>

            <td (click)="getVehicleDetails(vehicule)"><p-tag [value]="vehicule.immatriculation" severity="info"></p-tag></td>
            <td (click)="getVehicleDetails(vehicule)">{{ vehicule.marque }}</td>
            <td>{{ vehicule.modele }}</td>
            <td>{{ vehicule.annee }}</td>
            <td>{{ vehicule.typeVehicule }}</td>

            <td>
                <p-tag
                    [value]="vehicule.statut"
                    [severity]="getSeverity(vehicule.statut)">
                </p-tag>
            </td>

            <td>

                <p-button
                    icon="pi pi-pencil"
                    class="mr-2"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="editVehicule(vehicule)" />

                <p-button
                    icon="pi pi-trash"
                    severity="danger"
                    [rounded]="true"
                    [outlined]="true"
                    (click)="deleteVehicule(vehicule)" />
            </td>

        </tr>
    </ng-template>

</p-table>

<p-dialog
    [(visible)]="vehiculeDialog"
    header="Informations du véhicule"
    [modal]="true"
    [style]="{ width: '850px', overflow: 'scroll' }"
    [breakpoints]="{
        '960px': '75vw',
        '640px': '95vw'
    }"
    [contentStyle]="{ overflow: 'visible' }">

    <ng-template #content>

        <div class="grid grid-cols-12 gap-4">

            <!-- =========================
                 IMMATRICULATION + TYPE
            ========================== -->

            <div class="col-span-12 md:col-span-6">
                <label class="font-medium block">
                    Immatriculation
                </label>

                <input
                    pInputText
                    [(ngModel)]="vehicule.immatriculation"
                    class="w-full" />

                <small
                    class="text-red-500"
                    *ngIf="submitted && !vehicule.immatriculation">
                    Requis
                </small>
            </div>

            <div class="col-span-12 md:col-span-6">
                <label class="font-medium block">
                    Type véhicule
                </label>

                <p-select
                    [(ngModel)]="vehicule.typeVehicule"
                    [options]="typeVehicules"
                    optionLabel="libelle"
                    optionValue="code"
                    class="w-full">
                </p-select>
                <small
                    class="text-red-500"
                    *ngIf="submitted && !vehicule.typeVehicule">
                    Requis
                </small>
            </div>

            <!-- =========================
                 MARQUE / MODELE / ANNEE
            ========================== -->

            <div class="col-span-12 md:col-span-4">
                <label class="font-medium block">
                    Marque
                </label>

                <input
                    pInputText
                    [(ngModel)]="vehicule.marque"
                    class="w-full" />
            </div>

            <div class="col-span-12 md:col-span-4">
                <label class="font-medium block">
                    Modèle
                </label>

                <input
                    pInputText
                    [(ngModel)]="vehicule.modele"
                    class="w-full" />
            </div>

            <div class="col-span-12 md:col-span-4">
                <label class="font-medium block">
                    Année
                </label>

                <p-inputnumber
                    [(ngModel)]="vehicule.annee"
                    class="w-full">
                </p-inputnumber>
            </div>

            <!-- =========================
                 PRIX + KILOMETRAGE
            ========================== -->

            <div class="col-span-12 md:col-span-6">
                <label class="font-medium block">
                    Prix acquisition
                </label>

                <p-inputnumber
                    [(ngModel)]="vehicule.prixAcquisitionXaf"
                    mode="currency"
                    currency="XAF"
                    locale="fr-FR"
                    class="w-full">
                </p-inputnumber>
            </div>

            <div class="col-span-12 md:col-span-6">
                <label class="font-medium block">
                    Kilométrage actuel
                </label>

                <p-inputnumber
                    [(ngModel)]="vehicule.kilometrageActuel"
                    class="w-full">
                </p-inputnumber>
            </div>

            <!-- =========================
                 DATES
            ========================== -->

            <div class="col-span-12">
                <div class="border-b mb-2">
                    <span class="font-semibold text-lg">
                        Dates importantes
                    </span>
                </div>
            </div>

            <div class="col-span-12 md:col-span-3">
                <label class="font-medium block mb-2">
                    Date acquisition
                </label>

                <p-datepicker
                    [(ngModel)]="vehicule.dateAcquisition"
                    locale="fr-FR"
                    dateFormat="dd/mm/yy"
                    appendTo="body"
                    [showIcon]="true"
                    class="w-full">
                </p-datepicker>
            </div>

            <div class="col-span-12 md:col-span-3">
                <label class="font-medium block mb-2">
                    Expiration assurance
                </label>

                <p-datepicker
                    [(ngModel)]="vehicule.assuranceExpiration"
                    locale="fr-FR"
                    dateFormat="dd/mm/yy"
                    appendTo="body"
                    [showIcon]="true"
                    class="w-full">
                </p-datepicker>
            </div>

            <div class="col-span-12 md:col-span-3">
                <label class="font-medium block mb-2">
                    Expiration visite technique
                </label>

                <p-datepicker
                    [(ngModel)]="vehicule.visiteTechniqueExpiration"
                    locale="fr-FR"
                    dateFormat="dd/mm/yy"
                    appendTo="body"
                    [showIcon]="true"
                    class="w-full">
                </p-datepicker>
            </div>

            <div class="col-span-12 md:col-span-3">
                <label class="font-medium block mb-2">
                    Expiration vignette
                </label>

                <p-datepicker
                    [(ngModel)]="vehicule.vignetteExpiration"
                    locale="fr-FR"
                    dateFormat="dd/mm/yy"
                    appendTo="body"
                    [showIcon]="true"
                    class="w-full">
                </p-datepicker>
            </div>

            <!-- =========================
                 PHOTO
            ========================== -->

            <div class="col-span-12">
                <div class="border-b pb-1 mb-2">
                    <span class="font-semibold text-lg">
                        Photo du véhicule
                    </span>
                </div>
            </div>

            <div class="col-span-12 md:col-span-6">
                <label class="font-medium block mb-2">
                    Ajouter une photo
                </label>
                <p-fileupload name="demo" url="https://localhost:7118/api/Interventions/ReturnSuccess" (onUpload)="onUpload($event)" accept="image/*" maxFileSize="1000000">
                    <ng-template #empty>
                        <div>Drag and drop files to here to upload.</div>
                    </ng-template>
                </p-fileupload>
            </div>
            <div class="col-span-12 md:col-span-6">
                <label class="font-medium block mb-2">
                    Statut
                </label>

                <p-select
                    [(ngModel)]="vehicule.statut"
                    [options]="statuts"
                    optionLabel="libelle"
                    optionValue="code"
                    class="w-full">
                </p-select>
            </div>
            <!-- =========================
                 COMMENTAIRE
            ========================== -->

            <div class="col-span-12">
                <label class="font-medium block mb-2">
                    Commentaire
                </label>

                <textarea
                    pTextarea
                    [(ngModel)]="vehicule.notes"
                    rows="4"
                    placeholder="Ajouter un commentaire..."
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-200">
                </textarea>
            </div>

        </div>

    </ng-template>

    <ng-template #footer>

        <div class="flex justify-end gap-2">

            <p-button
                label="Fermer"
                icon="pi pi-times"
                severity="secondary"
                text
                (click)="hideDialog()">
            </p-button>

            <p-button
                label="Enregistrer"
                icon="pi pi-check"
                (click)="saveVehicule()">
            </p-button>

        </div>

    </ng-template>

</p-dialog>
<p-confirmdialog></p-confirmdialog>

<div *ngIf="afficherDetais()" class="mt-4">
    <app-details-vehicule
        [vehicule]="vehicule"
    >
    </app-details-vehicule>
</div>

<div *ngIf="afficherdepenses()" class="mt-4">
    <app-depenses-vehicule
    >
    </app-depenses-vehicule>
</div>
<p-toast></p-toast>
