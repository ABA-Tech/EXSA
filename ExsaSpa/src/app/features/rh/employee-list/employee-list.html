
<p-toolbar styleClass="mb-6">
    <ng-template #start>
        <p-button label="New" icon="pi pi-plus" severity="secondary" class="mr-2" (onClick)="openNew()" />
        <!-- <p-button severity="secondary" label="Delete" icon="pi pi-trash" outlined (onClick)="deleteSelectedemployes()" [disabled]="!selectedemployes || !selectedemployes.length" /> -->
    </ng-template>

    <ng-template #end>
        <p-button label="Export" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV()" />
    </ng-template>
</p-toolbar>

<p-table
    #dt
    [value]="employes()"
    [rows]="10"
    [columns]="cols"
    [paginator]="true"
    [globalFilterFields]="['name', 'country.name', 'representative.name', 'status']"
    [tableStyle]="{ 'min-width': '75rem' }"
    [rowHover]="true"
    dataKey="id"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} employes"
    [showCurrentPageReport]="true"
    [rowsPerPageOptions]="[10, 20, 30]"
>
    <ng-template #caption>
        <div class="flex items-center justify-between">
            <h5 class="m-0">Manage employes</h5>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Search..." />
            </p-iconfield>
        </div>
    </ng-template>
    <ng-template #header>
        <tr>
            <!-- <th style="width: 3rem">
                <p-tableHeaderCheckbox />
            </th> -->
            <!-- <th style="min-width: 16rem">Code</th> -->
            <th pSortableColumn="nom">
                Nom de l'employé
                <p-sortIcon field="nom" />
            </th>
            <!-- <th>Image</th> -->
            <th pSortableColumn="numeroEmploye">
                Numéro d'employé
                <p-sortIcon field="numeroEmploye" />
            </th>
            <th pSortableColumn="dateEmbauche">
                Date d'embauche
                <p-sortIcon field="dateEmbauche" />
            </th>
            <th pSortableColumn="typeContrat">
                Type de contrat
                <p-sortIcon field="typeContrat" />
            </th>
            <th pSortableColumn="estActif">
                Status
                <p-sortIcon field="estActif" />
            </th>
            <th style="min-width: 12rem"></th>
        </tr>
    </ng-template>
    <ng-template #body let-employe>
        <tr>
            <!-- <td style="width: 3rem">
                <p-tableCheckbox [value]="employe" />
            </td> -->
            <td>{{ employe.nom }}</td>
            <td>{{ employe.numeroEmploye }}</td>
            <!-- <td>
                <img [src]="'https://primefaces.org/cdn/primeng/images/demo/employe/' + employe.image" [alt]="employe.name" style="width: 64px" class="rounded" />
            </td> -->
            <td>{{ employe.dateEmbauche }}</td>
            <td>{{ employe.typeContrat }}</td>
            <td>
                <p-tag [value]="getSeverity(employe.estActif)" [severity]="getStatus(employe.estActif)" />
            </td>

            <td>
                <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (click)="editEmploye(employe)" />
                <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (click)="deleteEmploye(employe)" />
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="employeDialog" [style]="{ width: '450px' }" header="Employee Details" [modal]="true">
    <ng-template #content>
        <div class="flex flex-col gap-6">
            <!-- <img [src]="'https://primefaces.org/cdn/primeng/images/demo/employe/' + employe.image" [alt]="employe.image" class="block m-auto pb-4" *ngIf="employe.image" /> -->
            <div>
                <label for="name" class="block font-bold mb-3">Name</label>
                <input type="text" pInputText id="name" [(ngModel)]="employe.numeroEmploye" required autofocus fluid />
                <small class="text-red-500" *ngIf="submitted && !employe.numeroEmploye">Name is required.</small>
            </div>
            <div>
                <label for="description" class="block font-bold mb-3">Description</label>
                <textarea id="description" pTextarea [(ngModel)]="employe.numeroCnps" required rows="3" cols="20" fluid></textarea>
            </div>

            <div>
                <label for="inventoryStatus" class="block font-bold mb-3">Inventory Status</label>
                <p-select [(ngModel)]="employe.estActif" inputId="inventoryStatus" [options]="statuses" optionLabel="label" optionValue="label" placeholder="Select a Status" fluid />
            </div>

            <div>
                <span class="block font-bold mb-4">Category</span>
                <div class="grid grid-cols-12 gap-4">
                    <div class="flex items-center gap-2 col-span-6">
                        <p-radiobutton id="category1" name="category" value="Accessories" [(ngModel)]="employe.typeContrat" />
                        <label for="category1">Accessories</label>
                    </div>
                    <div class="flex items-center gap-2 col-span-6">
                        <p-radiobutton id="category2" name="category" value="Clothing" [(ngModel)]="employe.typeContrat" />
                        <label for="category2">Clothing</label>
                    </div>
                    <div class="flex items-center gap-2 col-span-6">
                        <p-radiobutton id="category3" name="category" value="Electronics" [(ngModel)]="employe.typeContrat" />
                        <label for="category3">Electronics</label>
                    </div>
                    <div class="flex items-center gap-2 col-span-6">
                        <p-radiobutton id="category4" name="category" value="Fitness" [(ngModel)]="employe.typeContrat" />
                        <label for="category4">Fitness</label>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-4">
                <div class="col-span-6">
                    <label for="price" class="block font-bold mb-3">Price</label>
                    <p-inputnumber id="price" [(ngModel)]="employe.salaireBaseXaf" mode="currency" currency="USD" locale="en-US" fluid />
                </div>
                <div class="col-span-6">
                    <label for="quantity" class="block font-bold mb-3">Quantity</label>
                    <p-inputnumber id="quantity" [(ngModel)]="employe.salaireBaseXaf" fluid />
                </div>
            </div>
        </div>
    </ng-template>

    <ng-template #footer>
        <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
        <p-button label="Save" icon="pi pi-check" (click)="saveEmploye()" />
    </ng-template>
</p-dialog>

<p-confirmdialog [style]="{ width: '450px' }" />
